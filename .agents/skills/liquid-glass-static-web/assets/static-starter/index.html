<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Liquid Glass</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>

  <main class="page-shell glass-surface">
    <header class="hero">
      <p class="eyebrow">Static HTML starter</p>
      <h1>A calm layer of liquid glass.</h1>
      <p class="intro">Replace this content and preserve the small, deliberate surface hierarchy.</p>
    </header>

    <section class="content-panel" aria-labelledby="section-title">
      <div>
        <p class="eyebrow">Next step</p>
        <h2 id="section-title">Shape the page around its real content.</h2>
      </div>
      <button class="primary-button" type="button">Continue</button>
    </section>

    <nav class="liquid-toolbar" aria-label="View options">
      <div class="toolbar-group">
        <button class="toolbar-button is-active" type="button" aria-pressed="true">Overview</button>
        <button class="toolbar-button" type="button" aria-pressed="false">Details</button>
      </div>
      <div class="toolbar-group">
        <button class="toolbar-button icon-button" type="button" aria-label="More options">•••</button>
      </div>
    </nav>
  </main>

  <script src="script.js"></script>
</body>
</html>
