<!doctype html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#071a2d">
    <meta name="color-scheme" content="dark">
    <title>我的背包清單</title>
    <link rel="stylesheet" href="styles.css?ui3.3">
</head>
<body>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>
    <div class="ambient ambient-three" aria-hidden="true"></div>

    <main class="container glass-surface">
        <div class="glass-layer glass-filter" aria-hidden="true"></div>
        <div class="glass-layer glass-overlay" aria-hidden="true"></div>
        <div class="glass-layer glass-specular" aria-hidden="true"></div>

        <header class="app-header">
            <div class="title-group">
                <span class="app-mark" aria-hidden="true">✦</span>
                <div>
                    <p class="eyebrow">Travel companion</p>
                    <h1>我的背包清單</h1>
                    <p class="subtitle">輕裝出發，重要的都帶上。</p>
                </div>
            </div>
            <div class="progress-pill" aria-live="polite">
                <span class="progress-dot" aria-hidden="true"></span>
                <span id="progressText">準備清單中</span>
            </div>
        </header>

        <section id="controlSection" aria-label="清單工具">
            <form id="addItemForm">
                <label class="sr-only" for="newItem">新增攜帶項目</label>
                <div id="addItemSection">
                    <span class="input-icon" aria-hidden="true">＋</span>
                    <input type="text" id="newItem" placeholder="新增攜帶項目…" autocomplete="off">
                    <button id="addButton" class="primary-button" type="submit">
                        <span aria-hidden="true">＋</span>
                        <span>新增</span>
                    </button>
                </div>
                <span id="inputError" class="error-message" role="alert"></span>
            </form>

            <div class="controlButtons">
                <button id="editButton" class="tool-button" type="button" onclick="toggleEditMode()">
                    <span aria-hidden="true">✎</span>
                    <span>編輯</span>
                </button>
                <button id="resetButton" class="tool-button" type="button" onclick="resetList(true)">
                    <span aria-hidden="true">↺</span>
                    <span>還原預設</span>
                </button>
                <button id="uncheckButton" class="tool-button danger-button" type="button" onclick="uncheckAll()">
                    <span aria-hidden="true">○</span>
                    <span>取消全部勾選</span>
                </button>
            </div>
        </section>

        <section id="listContainer" aria-label="攜帶項目">
            <ul id="travelList"></ul>
        </section>

        <nav id="tagSection" class="liquid-toolbar" aria-label="旅行類型" role="tablist">
            <span class="toolbar-indicator" aria-hidden="true"></span>
            <div class="toolbar-group" aria-label="旅遊清單">
                <button id="travelTwTag" class="tag active" type="button" role="tab" aria-selected="true" onclick="switchTag('travelTw')">
                    <span class="tag-icon" aria-hidden="true">⌂</span>
                    <span class="tag-label">國內旅遊</span>
                </button>
                <button id="travelGlobalTag" class="tag" type="button" role="tab" aria-selected="false" onclick="switchTag('travelGlobal')">
                    <span class="tag-icon" aria-hidden="true">✈</span>
                    <span class="tag-label">國外旅遊</span>
                </button>
            </div>
            <div class="toolbar-group toolbar-group-secondary" aria-label="工作清單">
                <button id="businessTag" class="tag" type="button" role="tab" aria-selected="false" onclick="switchTag('business')">
                    <span class="tag-icon" aria-hidden="true">◇</span>
                    <span class="tag-label">出差</span>
                </button>
            </div>
        </nav>

        <footer>
            <p>ALL RIGHTS RESERVED · DESIGNED BY AGA LIN</p>
            <p class="ver"></p>
        </footer>
    </main>

    <div id="confirmModal" class="modal" aria-hidden="true">
        <div class="modal-content glass-surface" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMessage">
            <span class="modal-icon" aria-hidden="true">!</span>
            <div class="modal-copy">
                <p id="modalTitle" class="modal-title">請確認操作</p>
                <p id="modalMessage"></p>
            </div>
            <div class="modal-buttons">
                <button id="cancelButton" class="tool-button" type="button">取消</button>
                <button id="confirmButton" class="confirm-danger" type="button">確認</button>
            </div>
        </div>
    </div>

    <svg class="liquid-filter-defs" aria-hidden="true" focusable="false" color-interpolation-filters="sRGB">
        <defs id="liquidFilterDefs"></defs>
    </svg>

    <script src="script.js?ui3.3"></script>
</body>
</html>
